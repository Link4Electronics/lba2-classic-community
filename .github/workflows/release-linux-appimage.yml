name: Release Linux AppImage

on:
  push:
    tags:
      - 'v*' # Triggers only on version tags
  workflow_dispatch:

jobs:
  build:
    name: "Build ${{ matrix.arch }}"
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            arch: x86_64
          - runs-on: ubuntu-24.04-arm
            arch: aarch64
    container: ghcr.io/pkgforge-dev/archlinux:latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v6
      - name: Preparing Container
        uses: pkgforge-dev/anylinux-setup-action@v2
      - name: Make AppImage
        run: /bin/sh ./packaging/make-appimage.sh
      - name: Upload temporary artifact
        uses: actions/upload-artifact@v7
        with:
          name: AppImage-${{ matrix.arch }}
          path: dist
          
  release:
    needs: [build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: AppImage-*
          merge-multiple: true
      - name: Generate appinfo for release
        run: |
          VERSION=$(cat VERSION.txt)
          echo "X-AppImage-Name=LBA2 Classic Community" > ./appinfo
          echo "X-AppImage-Version=$VERSION" >> ./appinfo
      - name: Release AppImage
        uses: pkgforge-dev/make-stable-appimage-release@v1.1
